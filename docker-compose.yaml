version: '3.8'

services:
  ppsspp-adhoc:
    build: .
    image: ppsspp-adhoc:latest
    container_name: ppsspp-adhoc
    ports:
      - "27312:27312"
      - "3000:3000"
    environment:
      - ADHOC_PORT=${ADHOC_PORT:-27312}
      - ADHOC_MAX_USERS=${ADHOC_MAX_USERS:-1024}
      - ADHOC_TIMEOUT=${ADHOC_TIMEOUT:-15}
      - DATABASE_PATH=/app/data/database.db
      - DATABASE_URL=file:/app/data/database.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
